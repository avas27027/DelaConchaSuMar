services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=astro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d astro" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  backend:
    build:
      context: ./rest-modules
      dockerfile: Dockerfile
    container_name: rest-modules-dev
    ports:
      - "3001:3001"
      - "9229:9229"
    command: npm run start:debug
    volumes:
      - ./rest-modules:/app
      - rest_node_modules:/app/node_modules # Evita que los node_modules locales sobreescriban los del contenedor
    environment:
      - PORT=3001
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
      - TSC_WATCHFILE=DynamicPriorityPolling
      - WATCHPACK_POLLING=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/astro?schema=public
    networks:
      - dev-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./AstroDeLaConchaSuMar
      dockerfile: Dockerfile
    container_name: astro-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./AstroDeLaConchaSuMar:/app
      - astro_node_modules:/app/node_modules # Evita conflictos de dependencias entre SO
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:3001
      - PUBLIC_BACKEND_URL=http://127.0.0.1:3001
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
      - WATCHPACK_POLLING=true
    networks:
      - dev-network
    depends_on:
      - backend

networks:
  dev-network:
    driver: bridge

volumes:
  postgres_data:
  rest_node_modules:
  astro_node_modules:
